name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'eiken-s-cbt/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: eiken-s-cbt/package-lock.json

      - name: Install and Build
        run: |
          cd eiken-s-cbt
          npm ci
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: eiken-s-cbt/dist
          branch: gh-pages
